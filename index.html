<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutriva — Costruttore di Diete</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a3d0a;
    --green-mid: #2d6a1f;
    --green: #3B6D11;
    --green-light: #639922;
    --green-pale: #C0DD97;
    --green-bg: #EAF3DE;
    --green-faint: #f3f9ec;
    --amber: #c47c0f;
    --amber-bg: #fef3dc;
    --red: #b83232;
    --red-bg: #fdeaea;
    --blue: #1d5fa8;
    --blue-bg: #e8f1fb;
    --bg: #f7f8f5;
    --surface: #ffffff;
    --border: #dde8d0;
    --border-light: #eef4e7;
    --text: #1a1f14;
    --text-mid: #4a5540;
    --text-muted: #7a8870;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── TOP NAV ── */
  .topnav {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px; height: 52px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }
  .topnav-logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; color: var(--green); text-decoration: none; }
  .logo-sq { width: 26px; height: 26px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
  .topnav-title { font-family: var(--font-body); font-size: 13px; color: var(--text-muted); margin-left: 4px; }
  .topnav-sep { width: 1px; height: 20px; background: var(--border); }
  .patient-pill { display: flex; align-items: center; gap: 8px; background: var(--green-bg); border: 1px solid var(--green-pale); border-radius: 20px; padding: 4px 12px 4px 6px; }
  .patient-avatar { width: 24px; height: 24px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; }
  .patient-name { font-size: 12px; font-weight: 500; color: var(--green-dark); }
  .topnav-spacer { flex: 1; }
  .topnav-kcal-total { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .kcal-badge { background: var(--green); color: #fff; font-weight: 600; font-size: 13px; padding: 3px 10px; border-radius: 20px; }
  .btn-save { background: var(--green); color: #fff; border: none; padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font-body); transition: background .15s; }
  .btn-save:hover { background: var(--green-dark); }

  /* ── LAYOUT ── */
  .layout { display: flex; height: calc(100vh - 52px); }

  /* ── DAY SIDEBAR ── */
  .day-sidebar {
    width: 68px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0; gap: 4px; overflow-y: auto;
  }
  .day-btn {
    width: 48px; height: 52px; border-radius: var(--radius-sm); border: 1px solid transparent;
    background: none; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1px;
    transition: all .15s; font-family: var(--font-body);
  }
  .day-btn:hover { background: var(--green-faint); border-color: var(--green-pale); }
  .day-btn.active { background: var(--green-bg); border-color: var(--green-pale); }
  .day-short { font-size: 9px; font-weight: 600; letter-spacing: .05em; color: var(--text-muted); text-transform: uppercase; }
  .day-btn.active .day-short { color: var(--green); }
  .day-num { font-size: 18px; font-weight: 300; color: var(--text-mid); line-height: 1; }
  .day-btn.active .day-num { font-weight: 600; color: var(--green-dark); }
  .day-kcal-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); margin-top: 2px; }
  .day-btn.has-food .day-kcal-dot { background: var(--green-light); }

  /* ── MAIN CONTENT ── */
  .main-content { flex: 1; overflow-y: auto; padding: 20px 24px 60px; }

  /* ── DAY HEADER ── */
  .day-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
    padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .day-title { font-family: var(--font-display); font-size: 26px; color: var(--green-dark); }
  .day-header-kcal { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .day-total-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
  .day-total-val { font-size: 28px; font-weight: 300; color: var(--green-dark); line-height: 1; }
  .day-total-val span { font-size: 13px; color: var(--text-muted); }
  .macro-chips { display: flex; gap: 6px; }
  .chip { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
  .chip-p { background: var(--blue-bg); color: var(--blue); }
  .chip-l { background: var(--amber-bg); color: var(--amber); }
  .chip-c { background: var(--green-bg); color: var(--green); }

  /* ── MEAL CARD ── */
  .meal-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .meal-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: var(--green-faint);
    border-bottom: 1px solid var(--border-light);
    cursor: pointer; user-select: none;
  }
  .meal-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .meal-name { font-weight: 600; font-size: 14px; color: var(--green-dark); }
  .meal-kcal { margin-left: auto; font-size: 13px; font-weight: 600; color: var(--green); background: var(--green-bg); padding: 3px 10px; border-radius: 20px; }
  .meal-toggle { font-size: 12px; color: var(--text-muted); margin-left: 6px; transition: transform .2s; }
  .meal-card.collapsed .meal-toggle { transform: rotate(-90deg); }
  .meal-body { padding: 10px 16px 14px; }
  .meal-card.collapsed .meal-body { display: none; }

  /* ── FOOD ROWS ── */
  .food-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border-light);
  }
  .food-row:last-child { border-bottom: none; }
  .food-name-col { flex: 1; min-width: 0; }
  .food-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .food-cat { font-size: 11px; color: var(--text-muted); }
  .food-grams-input {
    width: 72px; padding: 5px 8px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font-body);
    font-weight: 500; color: var(--text); text-align: right; background: var(--bg);
    transition: border-color .15s;
  }
  .food-grams-input:focus { outline: none; border-color: var(--green); background: #fff; }
  .food-grams-label { font-size: 11px; color: var(--text-muted); width: 14px; }
  .food-kcal { width: 64px; text-align: right; font-size: 13px; font-weight: 600; color: var(--green); }
  .food-kcal-label { font-size: 10px; color: var(--text-muted); width: 26px; }
  .food-macros { display: flex; gap: 6px; }
  .food-macro { font-size: 10px; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
  .btn-remove { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 0 2px; line-height: 1; transition: color .15s; flex-shrink: 0; }
  .btn-remove:hover { color: var(--red); }

  /* ── ADD FOOD ── */
  .add-food-bar { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
  .food-search-wrap { flex: 1; position: relative; }
  .food-search {
    width: 100%; padding: 8px 12px; border: 1px dashed var(--green-pale);
    border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font-body);
    background: var(--green-faint); color: var(--text); transition: all .15s;
  }
  .food-search:focus { outline: none; border-color: var(--green); background: #fff; border-style: solid; }
  .food-search::placeholder { color: var(--text-muted); }
  .autocomplete-dropdown {
    position: fixed; z-index: 9999;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); box-shadow: var(--shadow-md);
    max-height: 220px; overflow-y: auto; display: none;
  }
  .autocomplete-dropdown.open { display: block; }
  .ac-item { padding: 8px 12px; cursor: pointer; display: flex; flex-direction: column; gap: 1px; border-bottom: 1px solid var(--border-light); }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.focused { background: var(--green-faint); }
  .ac-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .ac-meta { font-size: 11px; color: var(--text-muted); }
  .ac-kcal { font-size: 11px; color: var(--green); font-weight: 600; }

  /* ── SIDEBAR PANEL ── */
  .side-panel {
    width: 240px; flex-shrink: 0; border-left: 1px solid var(--border);
    background: var(--surface); overflow-y: auto; padding: 16px;
  }
  .panel-title { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .week-summary { display: flex; flex-direction: column; gap: 6px; }
  .ws-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-light); }
  .ws-day { font-size: 11px; font-weight: 600; color: var(--text-muted); width: 28px; flex-shrink: 0; }
  .ws-bar-wrap { flex: 1; height: 5px; background: var(--border-light); border-radius: 3px; overflow: hidden; }
  .ws-bar { height: 100%; background: var(--green-light); border-radius: 3px; transition: width .3s; }
  .ws-val { font-size: 11px; font-weight: 600; color: var(--green-dark); width: 50px; text-align: right; }
  .ws-row.active-day { background: var(--green-bg); border-color: var(--green-pale); }
  .nutrient-breakdown { margin-top: 20px; }
  .nb-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border-light); }
  .nb-item:last-child { border-bottom: none; }
  .nb-label { font-size: 12px; color: var(--text-mid); }
  .nb-val { font-size: 12px; font-weight: 600; color: var(--text); }
  .nb-val.green { color: var(--green); }

  /* ── EMPTY STATE ── */
  .empty-state { padding: 20px; text-align: center; color: var(--text-muted); font-size: 12px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

const DAYS = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
const DAYS_SHORT = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

const MEALS = [
  { id: 'colazione', name: 'Colazione', icon: '☕', color: '#fef3dc' },
  { id: 'spuntino_m', name: 'Spuntino mattina', icon: '🍎', color: '#f3f9ec' },
  { id: 'pranzo', name: 'Pranzo', icon: '🍽️', color: '#e8f1fb' },
  { id: 'spuntino_p', name: 'Spuntino pomeriggio', icon: '🥜', color: '#f3f9ec' },
  { id: 'cena', name: 'Cena', icon: '🌙', color: '#f0ecfe' },
];

// State: diet[dayIndex][mealId] = [{foodId, grams}]
let diet = DAYS.map(() => Object.fromEntries(MEALS.map(m => [m.id, []])));
let activeDay = 0;

// Build food index
const FOOD_MAP = {};
FOODS.forEach(f => FOOD_MAP[f.id] = f);

function getKcal(foodId, grams) {
  const f = FOOD_MAP[foodId];
  if (!f || !f.k) return 0;
  return Math.round(f.k * grams / 100);
}
function getMacro(foodId, key, grams) {
  const f = FOOD_MAP[foodId];
  if (!f || !f[key]) return 0;
  return Math.round(f[key] * grams / 100 * 10) / 10;
}
function dayKcal(dayIdx) {
  let tot = 0;
  MEALS.forEach(m => {
    (diet[dayIdx][m.id] || []).forEach(item => { tot += getKcal(item.foodId, item.grams); });
  });
  return tot;
}
function mealKcal(dayIdx, mealId) {
  let tot = 0;
  (diet[dayIdx][mealId] || []).forEach(item => { tot += getKcal(item.foodId, item.grams); });
  return tot;
}
function dayMacros(dayIdx) {
  let p=0, l=0, c=0, fiber=0;
  MEALS.forEach(m => {
    (diet[dayIdx][m.id] || []).forEach(item => {
      p += getMacro(item.foodId, 'p', item.grams);
      l += getMacro(item.foodId, 'l', item.grams);
      c += getMacro(item.foodId, 'cb', item.grams);
      fiber += getMacro(item.foodId, 'f', item.grams);
    });
  });
  return { p: Math.round(p*10)/10, l: Math.round(l*10)/10, c: Math.round(c*10)/10, fiber: Math.round(fiber*10)/10 };
}
function hasFood(dayIdx) {
  return MEALS.some(m => (diet[dayIdx][m.id]||[]).length > 0);
}

// ── RENDER ──
function renderAll() {
  renderSidebar();
  renderMain();
  renderPanel();
}

function renderSidebar() {
  const sb = document.getElementById('day-sidebar');
  sb.innerHTML = DAYS.map((d, i) => `
    <button class="day-btn ${i===activeDay?'active':''} ${hasFood(i)?'has-food':''}" onclick="selectDay(${i})">
      <span class="day-short">${DAYS_SHORT[i]}</span>
      <span class="day-num">${i+1}</span>
      <div class="day-kcal-dot"></div>
    </button>
  `).join('');
}

function renderMain() {
  const mc = document.getElementById('main-content');
  const kcal = dayKcal(activeDay);
  const mac = dayMacros(activeDay);
  mc.innerHTML = `
    <div class="day-header">
      <div>
        <div class="day-title">${DAYS[activeDay]}</div>
        <div class="macro-chips" style="margin-top:4px;">
          <span class="chip chip-p">P: ${mac.p}g</span>
          <span class="chip chip-l">L: ${mac.l}g</span>
          <span class="chip chip-c">C: ${mac.c}g</span>
        </div>
      </div>
      <div class="day-header-kcal">
        <div class="day-total-label">Totale giornaliero</div>
        <div class="day-total-val">${kcal}<span> kcal</span></div>
      </div>
    </div>
    ${MEALS.map(m => renderMealCard(m)).join('')}
  `;
}

function renderMealCard(meal) {
  const items = diet[activeDay][meal.id] || [];
  const kcal = mealKcal(activeDay, meal.id);
  return `
    <div class="meal-card" id="meal-${meal.id}">
      <div class="meal-header" onclick="toggleMeal('${meal.id}')">
        <div class="meal-icon" style="background:${meal.color}">${meal.icon}</div>
        <span class="meal-name">${meal.name}</span>
        <span class="meal-kcal">${kcal} kcal</span>
        <span class="meal-toggle">▾</span>
      </div>
      <div class="meal-body">
        ${items.length === 0 ? '<div class="empty-state">Nessun alimento aggiunto</div>' :
          items.map((item, idx) => renderFoodRow(item, meal.id, idx)).join('')}
        <div class="add-food-bar">
          <div class="food-search-wrap">
            <input class="food-search" type="text"
              placeholder="Cerca alimento CREA..."
              id="search-${meal.id}"
              oninput="onSearch('${meal.id}', this.value)"
              onkeydown="onSearchKey(event, '${meal.id}')"
              onfocus="onSearch('${meal.id}', this.value)"
              autocomplete="off">
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderFoodRow(item, mealId, idx) {
  const f = FOOD_MAP[item.foodId];
  if (!f) return '';
  const kcal = getKcal(item.foodId, item.grams);
  const p = getMacro(item.foodId, 'p', item.grams);
  const l = getMacro(item.foodId, 'l', item.grams);
  const c = getMacro(item.foodId, 'cb', item.grams);
  return `
    <div class="food-row" id="row-${mealId}-${idx}">
      <div class="food-name-col">
        <div class="food-name" title="${f.n}">${f.n}</div>
        <div class="food-cat">${f.c}</div>
      </div>
      <div class="food-macros">
        <span class="food-macro chip-p" style="background:#e8f1fb;color:#1d5fa8;font-size:10px;padding:2px 6px;border-radius:10px;">P ${p}g</span>
        <span class="food-macro" style="background:#fef3dc;color:#c47c0f;font-size:10px;padding:2px 6px;border-radius:10px;">L ${l}g</span>
        <span class="food-macro chip-c" style="background:#EAF3DE;color:#3B6D11;font-size:10px;padding:2px 6px;border-radius:10px;">C ${c}g</span>
      </div>
      <input class="food-grams-input" type="number" min="1" max="2000" value="${item.grams}"
        onchange="updateGrams('${mealId}', ${idx}, this.value)"
        oninput="updateGrams('${mealId}', ${idx}, this.value)">
      <span class="food-grams-label">g</span>
      <span class="food-kcal">${kcal}</span>
      <span class="food-kcal-label">kcal</span>
      <button class="btn-remove" onclick="removeFood('${mealId}', ${idx})">×</button>
    </div>
  `;
}

function renderPanel() {
  // Week summary
  const ws = document.getElementById('week-summary');
  const kcals = DAYS.map((_, i) => dayKcal(i));
  const maxK = Math.max(...kcals, 1);
  const nonZero = kcals.filter(k=>k>0);
  const avg = nonZero.length ? Math.round(nonZero.reduce((a,b)=>a+b,0)/nonZero.length) : 0;
  document.getElementById('week-avg-kcal').textContent = avg ? `${avg} kcal/die` : '0 kcal';
  ws.innerHTML = DAYS.map((d, i) => `
    <div class="ws-row ${i===activeDay?'active-day':''}">
      <span class="ws-day">${DAYS_SHORT[i]}</span>
      <div class="ws-bar-wrap"><div class="ws-bar" style="width:${Math.round(kcals[i]/maxK*100)}%"></div></div>
      <span class="ws-val">${kcals[i]?kcals[i]+' kcal':'-'}</span>
    </div>
  `).join('');
  // Day breakdown
  const mac = dayMacros(activeDay);
  const kcal = dayKcal(activeDay);
  const db = document.getElementById('day-breakdown');
  if (kcal === 0) { db.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">Nessun alimento inserito</div>'; return; }
  const pct = (v, cal) => cal ? Math.round(v*cal/kcal) + '%' : '-';
  db.innerHTML = `
    <div class="nb-item"><span class="nb-label">Energia</span><span class="nb-val green">${kcal} kcal</span></div>
    <div class="nb-item"><span class="nb-label">Proteine</span><span class="nb-val">${mac.p} g</span></div>
    <div class="nb-item"><span class="nb-label">Lipidi</span><span class="nb-val">${mac.l} g</span></div>
    <div class="nb-item"><span class="nb-label">Carboidrati</span><span class="nb-val">${mac.c} g</span></div>
    <div class="nb-item"><span class="nb-label">Fibre</span><span class="nb-val">${mac.fiber} g</span></div>
    ${MEALS.map(m => {
      const mk = mealKcal(activeDay, m.id);
      if (!mk) return '';
      return `<div class="nb-item"><span class="nb-label">${m.icon} ${m.name}</span><span class="nb-val">${mk} kcal</span></div>`;
    }).join('')}
  `;
}

// ── INTERACTIONS ──
function selectDay(i) {
  activeDay = i;
  renderAll();
}

function toggleMeal(mealId) {
  const card = document.getElementById('meal-'+mealId);
  card.classList.toggle('collapsed');
}

function updateGrams(mealId, idx, val) {
  const g = Math.max(1, parseInt(val)||1);
  diet[activeDay][mealId][idx].grams = g;
  // Update just the row and totals without full re-render
  const row = document.getElementById(`row-${mealId}-${idx}`);
  if (row) {
    const item = diet[activeDay][mealId][idx];
    row.outerHTML = renderFoodRow(item, mealId, idx);
  }
  refreshTotals();
}

function removeFood(mealId, idx) {
  diet[activeDay][mealId].splice(idx, 1);
  renderAll();
}

function refreshTotals() {
  // Update day header totals
  const kcal = dayKcal(activeDay);
  const mac = dayMacros(activeDay);
  const dv = document.querySelector('.day-total-val');
  if (dv) dv.innerHTML = `${kcal}<span> kcal</span>`;
  const chips = document.querySelector('.macro-chips');
  if (chips) chips.innerHTML = `
    <span class="chip chip-p">P: ${mac.p}g</span>
    <span class="chip chip-l">L: ${mac.l}g</span>
    <span class="chip chip-c">C: ${mac.c}g</span>
  `;
  MEALS.forEach(m => {
    const mk = document.querySelector(`#meal-${m.id} .meal-kcal`);
    if (mk) mk.textContent = mealKcal(activeDay, m.id) + ' kcal';
  });
  renderPanel();
  renderSidebar();
}

// ── AUTOCOMPLETE (single global portal) ──
let acActiveMeal = null;
let acFocusIdx = -1;

const acPortal = document.createElement('div');
acPortal.className = 'autocomplete-dropdown';
acPortal.id = 'ac-portal';
document.body.appendChild(acPortal);

function positionPortal(inputEl) {
  const rect = inputEl.getBoundingClientRect();
  acPortal.style.left = rect.left + 'px';
  acPortal.style.top  = (rect.bottom + 4) + 'px';
  acPortal.style.width = rect.width + 'px';
}

function closePortal() {
  acPortal.classList.remove('open');
  acPortal.innerHTML = '';
  acActiveMeal = null;
  acFocusIdx = -1;
}

function onSearch(mealId, query) {
  const inp = document.getElementById('search-' + mealId);
  acActiveMeal = mealId;
  acFocusIdx = -1;
  if (!query || query.length < 2) { closePortal(); return; }
  const q = query.toLowerCase();
  const results = FOODS
    .filter(f => f.n.toLowerCase().includes(q) || f.c.toLowerCase().includes(q))
    .sort((a, b) => {
      const an = a.n.toLowerCase(), bn = b.n.toLowerCase();
      const aStarts = an.startsWith(q), bStarts = bn.startsWith(q);
      if (aStarts !== bStarts) return aStarts ? -1 : 1;
      const aName = an.includes(q), bName = bn.includes(q);
      if (aName !== bName) return aName ? -1 : 1;
      return an.localeCompare(bn);
    })
    .slice(0, 30);
  if (!results.length) { closePortal(); return; }
  acPortal.innerHTML = results.map(f => `
    <div class="ac-item" data-id="${f.id}" data-meal="${mealId}" onmousedown="addFood('${mealId}','${f.id}')">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;">
        <span class="ac-name">${f.n}</span>
        <span class="ac-kcal">${f.k} kcal/100g</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="ac-meta">${f.c}</span>
        <span class="ac-meta" style="color:#1d5fa8;">P:${f.p}g</span>
        <span class="ac-meta" style="color:#c47c0f;">L:${f.l}g</span>
        <span class="ac-meta" style="color:#3B6D11;">C:${f.cb}g</span>
      </div>
    </div>
  `).join('');
  positionPortal(inp);
  acPortal.classList.add('open');
}

function onSearchKey(event, mealId) {
  if (!acPortal.classList.contains('open')) return;
  const items = acPortal.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (event.key === 'ArrowDown') {
    event.preventDefault();
    acFocusIdx = Math.min(acFocusIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx));
    items[acFocusIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (event.key === 'ArrowUp') {
    event.preventDefault();
    acFocusIdx = Math.max(acFocusIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx));
    items[acFocusIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (event.key === 'Enter') {
    event.preventDefault();
    const focused = acPortal.querySelector('.focused');
    if (focused) addFood(mealId, focused.dataset.id);
  } else if (event.key === 'Escape') {
    closePortal();
  }
}

function addFood(mealId, foodId) {
  diet[activeDay][mealId].push({ foodId, grams: 100 });
  closePortal();
  renderAll();
  setTimeout(() => {
    const inp = document.getElementById('search-' + mealId);
    if (inp) { inp.value = ''; inp.focus(); }
  }, 50);
}

// Reposition portal on scroll/resize
document.querySelector('.main-content').addEventListener('scroll', () => {
  if (acActiveMeal) {
    const inp = document.getElementById('search-' + acActiveMeal);
    if (inp) positionPortal(inp); else closePortal();
  }
});
window.addEventListener('resize', () => { if (acActiveMeal) closePortal(); });

// Close on outside click
document.addEventListener('mousedown', e => {
  if (!acPortal.contains(e.target) && !e.target.classList.contains('food-search')) {
    closePortal();
  }
});

// ── INIT ──
renderAll();
</script>
